name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build web app
        run: pnpm --filter @mcp-builder/web build

  # Proves end to end that code produced by the generator actually compiles and
  # passes its own tests: scaffold a fresh server from the example definition,
  # then install, build, and test it in isolation (outside the pnpm workspace).
  generated-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core + CLI
        run: pnpm build

      - name: Generate a server from the example definition
        run: node packages/cli/dist/index.js generate examples/dev-utils.config.ts --out "$RUNNER_TEMP/generated-server" --force

      - name: Install the generated server
        working-directory: ${{ runner.temp }}/generated-server
        run: npm install

      - name: Build the generated server
        working-directory: ${{ runner.temp }}/generated-server
        run: npm run build

      - name: Test the generated server
        working-directory: ${{ runner.temp }}/generated-server
        run: npm test

      - name: Smoke-check the generated server with the MCP Inspector
        working-directory: ${{ runner.temp }}/generated-server
        run: |
          npx -y @modelcontextprotocol/inspector --cli node dist/index.js --method tools/list | tee tools.json
          grep -q '"hash_text"' tools.json
          grep -q '"generate_uuid"' tools.json
          grep -q '"format_json"' tools.json
          echo "MCP Inspector smoke check passed"
