<svg width="760" height="200" viewBox="0 0 760 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mcp-builder">
  <defs>
    <linearGradient id="badge" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#badge)"/>

  <!-- Node graph: two source nodes assembling into one hub (MCP connection) -->
  <g stroke="#FFFFFF" stroke-width="9" stroke-linecap="round">
    <line x1="74" y1="74" x2="128" y2="100"/>
    <line x1="74" y1="126" x2="128" y2="100"/>
  </g>
  <g fill="#FFFFFF">
    <circle cx="74" cy="74" r="13"/>
    <circle cx="74" cy="126" r="13"/>
  </g>
  <circle cx="128" cy="100" r="18" fill="#0F172A" stroke="#FFFFFF" stroke-width="7"/>

  <!-- Wordmark -->
  <text x="210" y="104" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="58" letter-spacing="-1">
    <tspan fill="#94A3B8" font-weight="500">mcp</tspan><tspan fill="#0F172A" font-weight="700">-builder</tspan>
  </text>
  <text x="212" y="146" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="23" fill="#64748B" font-weight="500">
    scaffold typed, tested MCP servers from a declaration
  </text>
</svg>
